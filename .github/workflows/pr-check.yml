name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint + JSON validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff syntax check
        run: |
          # 只做语法和明显错误，不做风格强制
          ruff check apps/mining_pm --select=E,F,W --ignore=E501 || true
          # 让步骤永远不失败，只是把问题展示出来——MVP 阶段不卡 PR
          echo "ruff check finished (advisory mode)"

      - name: Find DocType JSONs
        id: find_jsons
        run: |
          jsons=$(find apps/mining_pm -name "*.json" -path "*/doctype/*" 2>/dev/null || echo "")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$jsons" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found DocType JSONs:"
          echo "$jsons"

      - name: Validate DocType JSON
        if: steps.find_jsons.outputs.files != ''
        run: |
          if [ -f scripts/validate-doctype.py ]; then
            for f in ${{ steps.find_jsons.outputs.files }}; do
              echo "Validating: $f"
              python scripts/validate-doctype.py "$f" || exit 1
            done
          else
            echo "scripts/validate-doctype.py not found, skip"
          fi

      - name: Check naming
        run: |
          # 检查字段命名（snake_case，不带拼音）
          if [ -f scripts/check-naming.py ]; then
            python scripts/check-naming.py apps/mining_pm
          else
            echo "scripts/check-naming.py not found, skip"
          fi

  notify-feishu:
    name: Notify Feishu
    runs-on: ubuntu-latest
    needs: lint-and-validate
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Notify
        if: env.FEISHU_WEBHOOK != ''
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          CHECK_RESULT: ${{ needs.lint-and-validate.result }}
        run: |
          # 关键词：Codex / mining_pm
          if [ "$CHECK_RESULT" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="检查通过"
            COLOR="green"
          else
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="检查失败"
            COLOR="orange"
          fi

          curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": {\"content\": \"$STATUS_EMOJI Codex mining_pm PR #$PR_NUMBER\", \"tag\": \"plain_text\"},
                  \"template\": \"$COLOR\"
                },
                \"elements\": [
                  {\"tag\": \"div\", \"text\": {\"content\": \"**$PR_TITLE**\n\nCI 状态：$STATUS_TEXT\", \"tag\": \"lark_md\"}},
                  {\"tag\": \"action\", \"actions\": [
                    {\"tag\": \"button\", \"text\": {\"content\": \"查看 PR\", \"tag\": \"plain_text\"}, \"url\": \"$PR_URL\", \"type\": \"primary\"}
                  ]}
                ]
              }
            }"
